<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
        <link rel="stylesheet" type="text/css" href="stylesheet.css">
        <title>SolarYield | Photovoltaik-Rechner mit Ertragsgraph</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

</head>
<body>
<div class="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">

        </div>

        <div class="card">
                <div class="input-grid">

                </div>

        </div>

        <div class="graph-container" id="graphCard">
                <div style="display: flex; justify-content: space-between;">
                        <strong>Energieertrag (Wh)</strong>
                        <span id="metaInfo" class="badge">Bereitschaft</span>
                </div>
                <canvas id="powerChart" width="800" height="350" style="max-height: 400px; width:100%"></canvas>
                <div id="resultStats" class="result-stats">
                        <div class="stat-card"><div class="stat-value" id="totalValue">—</div><div>Gesamtenergie (Wh)</div></div>
                        <div class="stat-card"><div class="stat-value" id="peakValue">—</div><div>Max. Leistung (W)</div></div>
                        <div class="stat-card"><div class="stat-value" id="panelEffUsed">—</div><div>Effizienz (gewählt)</div></div>
                </div>
                <div id="debugMsg" style="font-size: 0.8rem; text-align: center; margin-top: 12px; color: #3e6b55;"></div>
        </div>
</div>

<script src="frontend.js"></script>
</body>
</html>
