<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
        <title>SolarYield | Photovoltaik-Rechner mit Ertragsgraph</title>
        <link rel="stylesheet" type="text/css" href="stylesheet.css">
        <!-- Chart.js remains unchanged -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <h1>SolarYield</h1>
                <button id="historyBtn" style="background: #2c5a3e; padding: 10px 24px;">
                        Berechnungshistorie
                </button>
        </div>

        <div class="card">
                <div class="input-grid">
                        <div class="field-group">
                                <label>Berechnungstyp</label>
                                <select id="calcType" style="color: black">
                                        <option value="daily" selected>Tagesenergie (Tagesverlauf)</option>
                                        <option value="moment" style="color: black">Momentanleistung (ein Zeitpunkt)</option>
                                </select>
                        </div>
                        <div class="field-group">
                                <label>Paneltyp</label>
                                <select id="panelType" style="color: black">
                                        <option value="monocrystalline">Monokristallin (≈20%)</option>
                                        <option value="polycrystalline">Polykristallin (≈16.5%)</option>
                                        <option value="thinFilm">Dünnschicht (≈11%)</option>
                                </select>
                        </div>
                        <div class="field-group">
                                <label>Breitengrad (Latitude)</label>
                                <input type="number" id="latitude" value="50.0" step="1" min="-90" max="90">
                        </div>
                        <div class="field-group">
                                <label>Panelneigung (Tilt) °</label>
                                <input type="number" id="panelTilt" value="35" min="0" max="90">
                        </div>
                        <div class="field-group">
                                <label>Azimut (Panelausrichtung) °</label>
                                <input type="number" id="panelAzimuth" value="180" min="-180" max="360">
                        </div>
                        <div class="field-group">
                                <label>Modulfläche (m²)</label>
                                <input type="number" id="panelArea" value="1.8" step="0.1" min="0.1">
                        </div>
                        <div class="field-group">
                                <label>Wetterfaktor (0=klar, 1=voll bewölkt)</label>
                                <div style="display: flex; gap: 12px; align-items: center;">
                                        <span style="font-size: 0.8rem;">Klar</span>
                                        <input type="range" id="weather" value="0.2" step="0.01" min="0" max="0.9"
                                               class="range-input"
                                               oninput="document.getElementById('weatherValue').innerText = this.value">
                                        <span style="font-size: 0.8rem;">Bewölkt</span>
                                </div>
                                <div style="display: flex; justify-content: space-between; margin-top: 5px;">
                                        <span style="font-size: 0.7rem; color: #666;">0.0</span>
                                        <span id="weatherValue" style="font-weight: 600; color: #1f6e48;">0.20</span>
                                        <span style="font-size: 0.7rem; color: #666;">0.9</span>
                                </div>
                        </div>
                </div>

                <div id="dayMonthContainer" class="flex-row" style="margin-bottom: 10px;">
                        <div style="display: flex; gap: 12px; flex: 2;">
                                <div class="field-group" style="flex: 1;">
                                        <label>Tag (1-31)</label>
                                        <input type="number" id="dayInput" value="21" min="1" max="31" step="1">
                                        <span class="inline-hint" style="font-size: 0.7rem;">1-31</span>
                                </div>
                                <div class="field-group" style="flex: 1;">
                                        <label>Monat (1-12)</label>
                                        <input type="number" id="monthInput" value="6" min="1" max="12" step="1">
                                        <span class="inline-hint" style="font-size: 0.7rem;">1-12</span>
                                </div>
                        </div>
                </div>

                <div id="hourContainer" class="flex-row" style="margin-bottom: 20px; display: none;">
                        <div class="field-group" style="flex:1;">
                                <label>Für „Moment“: Stunde (0-23)</label>
                                <input type="number" id="specificHour" value="12" min="0" max="23" step="1">
                        </div>
                </div>

                <div class="flex-row" style="justify-content: space-between; align-items: center;">
                        <div class="field-group" style="flex:1">
                                <label>Graph-Zeitspanne</label>
                                <select id="graphGranularity">
                                        <option value="hourly">Stundenverlauf (max 24h)</option>
                                        <option value="daily">Tagesverlauf (max 30 Tage)</option>
                                </select>
                                <span class="inline-hint" style="color: white">this is filler text for spacing</span>
                        </div>
                        <div class="field-group" style="flex:1">
                                <label>Anzahl Einheiten (Stunden/Tage)</label>
                                <input type="number" id="rangeCount" value="12" min="1" max="48">
                                <span class="inline-hint">max 24h oder 30 Tage (je nach Typ)</span>
                        </div>
                        <button id="computeBtn">ERTRAG BERECHNEN & GRAFIK</button>
                </div>
        </div>

        <!-- Ergebnis + Graph (now appears on the left side via CSS grid) -->
        <div class="graph-container" id="graphCard">
                <div style="display: flex; justify-content: space-between;">
                        <strong>Energieertrag (Wh)</strong>
                        <span id="metaInfo" class="badge">Bereitschaft</span>
                </div>
                <canvas id="powerChart" width="800" height="350" style="max-height: 400px; width:100%"></canvas>
                <div id="resultStats" class="result-stats">
                        <div class="stat-card"><div class="stat-value" id="totalValue">—</div><div>Gesamtenergie (Wh)</div></div>
                        <div class="stat-card"><div class="stat-value" id="peakValue">—</div><div>Max. Leistung (W)</div></div>
                        <div class="stat-card"><div class="stat-value" id="panelEffUsed">—</div><div>Effizienz (gewählt)</div></div>
                </div>
                <div id="debugMsg" style="font-size: 0.8rem; text-align: center; margin-top: 12px; color: #3e6b55;"></div>
        </div>
</div>

<script src="frontend.js"></script>
</body>
</html>
