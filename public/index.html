
<!-- V.P -->
<!DOCTYPE html>
<html>
<head>
        <title>Solar Calculator</title>
</head>
<body>
<h1>Solar Panel Calculator</h1>

<form id="calcForm">
        <h2>Calculation Type</h2>
        <select id="calculationType">
                <option value="moment">Moment</option>
                <option value="daily">Daily</option>
        </select><br><br>

        <h2>Panel Type</h2>
        <select id="type">
                <option value="monocrystalline">Monocrystalline</option>
                <option value="polycrystalline">Polycrystalline</option>
                <option value="thinFilm">Thin Film</option>
        </select><br><br>

        <div style="border:1px solid #ccc; padding:15px; width:300px; border-radius:8px; justify-content: center">
                <div style="text-align: center">
                        <label>Weather Condition: </label>
                        <span id="weatherCondition">0%</span><br><br>
                </div>


                <div style="display:flex; align-items:center; gap:10px;">
                        <span style="font-size:12px;">Clear Sky</span>

                        <input
                                type="range"
                                id="weather"
                                min="0"
                                max="1"
                                step="0.01"
                                value="0"
                                style="flex:1;"
                        >

                        <span style="font-size:12px;">Completely Cloudy</span>
                </div>
        </div>
        <br>

        <!-- <input id="latitude" placeholder="Latitude" required><br><br>   -->
        <!-- <input id="longitude" placeholder="longitude" required><br><br> -->
        <label>panel tilt</label><br>
        <input id="panelTilt" placeholder="Panel Tilt: (0-90)" required><br><br>
        <label>panel cardinality</label><br>
        <input id="panelAzimuth" placeholder="Panel Cardinality: (-180-360)" required><br><br>
        <label>panel area</label><br>
        <input id="panelArea" placeholder="Panel Area (m*m)"><br><br>

        <label>Start Date:</label><br>
        <input type="date" id="startDate" placeholder="Start Date"><br><br>

        <label>hours</label><br>
        <input id="hour" placeholder="Hour: (0-24)"><br><br>

        <button type="submit">Calculate</button>
</form>

<h2>Result</h2>
<pre id="result"></pre>

<h2>Saved</h2>
<button onclick="loadCalculations()">Refresh</button>
<table border="1">
        <thead>
        <tr>
                <th>ID</th>
                <th>Power</th>
                <th>Panel Type</th>
                <th>Calculation Type</th>
        </tr>
        </thead>
        <tbody id="list"></tbody>
</table>

<script>
    const API = "/api"; // IMPORTANT: same origin

    const slider = document.getElementById("weather");
    const label = document.getElementById("weatherCondition");

    slider.addEventListener("input", () => {
        console.log(slider.value)
        label.textContent = Math.round(slider.value * 100) + "%";
    });

    document.getElementById("calcForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const startDate = document.getElementById("startDate").value;


        const data = {
            calculationType: document.getElementById("calculationType").value,
            type: document.getElementById("type").value,
            latitude: 47.40,
            longitude: 8.5,
            panelTilt: document.getElementById("panelTilt").value,
            panelAzimuth: document.getElementById("panelAzimuth").value,
            panelArea: document.getElementById("panelArea").value,
            dayOfYear: getDayOfYear(startDate),
            hour: document.getElementById("hour").value,
            weather: parseFloat(slider.value)
        };

        const res = await fetch(`${API}/calculations`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "same-origin", // works automatically now
            body: JSON.stringify(data)
        });

        const json = await res.json();
        document.getElementById("result").textContent =
            JSON.stringify(json, null, 2);

        loadCalculations();
    });

    async function loadCalculations() {
        const res = await fetch(`${API}/calculations`);
        const data = await res.json();

        const list = document.getElementById("list");
        list.innerHTML = "";

        data.calculations.forEach(c => {
            const tr = document.createElement("tr");

            const power =  c.result?.energy ?? c.result?.energyWh ?? "-";
            let powerMeasurment
            if (power === c.result?.energy) {
                powerMeasurment = "KW"
            } else {
                powerMeasurment = "KWh"
            }
            const panelType = c.result?.panelType || "-";



            tr.innerHTML = `
                            <td>${c.id}</td>
                            <td style="text-align: right">${Math.round(power*100)/100} ${powerMeasurment}</td>
                            <td>${panelType}</td>
                            <td>${c.calculationType}</td>
                          `;

            list.appendChild(tr);
        });
    }

    function getDayOfYear(dateString) {
        if (!dateString) return null;

        const date = new Date(dateString);
        const start = new Date(date.getFullYear(), 0, 0);
        const diff = date - start;
        return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    loadCalculations();
</script>
</body>
</html>
